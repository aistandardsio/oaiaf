site_name: OAIAF - Open Agent Internet Architecture Framework
site_description: Reference architecture for enterprise AI agent identity and authorization
site_url: https://aistandards.io/oaiaf/
repo_url: https://github.com/aistandardsio/oaiaf
repo_name: aistandardsio/oaiaf

theme:
  name: material
  custom_dir: docs/overrides
  palette:
    # Dark mode first (AIStandards.io default)
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow

extra_css:
  - https://aistandards.io/css/aistandardsio-mkdocs.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - def_list
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Architecture:
    - Overview: architecture.md
    - Protocol Flows: flows.md
  - Identity Stack:
    - Layer 1 - Lifecycle (SCIM): layers/lifecycle.md
    - Layer 2 - Workload Identity (SPIFFE): layers/workload-identity.md
    - Layer 3 - Agent Auth (AAuth): layers/agent-auth.md
    - Layer 4 - Human Delegation (ID-JAG): layers/human-delegation.md
    - Layer 5 - Authorization (AuthZEN): layers/authorization.md
  - Interoperability:
    - A2A Protocol: interop/a2a.md
    - MCP Integration: interop/mcp.md
  - Agent Types:
    - Overview: agents/overview.md
    - Coding Assistants: agents/coding-assistants.md
    - Hosted Platforms: agents/hosted-platforms.md
    - Multi-Agent Orchestration: agents/multi-agent.md
    - Enterprise Frameworks: agents/enterprise.md
  - Observability:
    - OpenTelemetry: observability/opentelemetry.md
    - AgentOps: observability/agentops.md
  - Runtime:
    - Kubernetes: runtime/kubernetes.md
    - SPIRE: runtime/spire.md
    - Service Mesh: runtime/service-mesh.md
  - Specifications:
    - Roadmap: specs/ROADMAP.md
  - Release Notes:
    - v0.1.0: releases/v0.1.0.md
  - Related Projects:
    - agent-protocols: https://aistandards.io/agent-protocols/
    - agentauth: https://github.com/plexusone/agentauth

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/aistandardsio/oaiaf

plugins:
  - search
